name: Release

on:
  push:
    tags:
      - 'v*'

env:
  APP_NAME: Geisterhand

jobs:
  build-and-release:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build universal release and create app bundle
        run: make app

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import the certificate
          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Verify the identity was imported
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Sign app
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
        run: |
          echo "Signing with identity: $DEVELOPER_ID"
          security find-identity -v -p codesigning
          make sign DEVELOPER_ID="$DEVELOPER_ID"

      - name: Create DMG
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
        run: make dmg DEVELOPER_ID="$DEVELOPER_ID"

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARIZE_PASSWORD: ${{ secrets.NOTARIZE_PASSWORD }}
        run: |
          xcrun notarytool submit ".build/universal/${{ env.APP_NAME }}-${{ steps.version.outputs.VERSION }}.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$NOTARIZE_PASSWORD" \
            --wait

      - name: Staple notarization ticket
        run: xcrun stapler staple ".build/universal/${{ env.APP_NAME }}-${{ steps.version.outputs.VERSION }}.dmg"

      - name: Verify notarization
        run: |
          spctl --assess --verbose=4 --type install ".build/universal/${{ env.APP_NAME }}-${{ steps.version.outputs.VERSION }}.dmg"

      - name: Calculate SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 ".build/universal/${{ env.APP_NAME }}-${{ steps.version.outputs.VERSION }}.dmg" | awk '{print $1}')
          echo "SHA256=$SHA" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Geisterhand v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: |
            .build/universal/${{ env.APP_NAME }}-${{ steps.version.outputs.VERSION }}.dmg
          body: |
            ## Geisterhand v${{ steps.version.outputs.VERSION }}

            macOS screen automation tool with HTTP API.

            ### Installation

            **Homebrew (recommended):**
            ```bash
            brew install --cask geisterhand-io/tap/geisterhand
            ```

            **Manual download:**
            Download `${{ env.APP_NAME }}-${{ steps.version.outputs.VERSION }}.dmg` below and drag to Applications.

            ### SHA256
            ```
            ${{ steps.sha.outputs.SHA256 }}
            ```

            ### Requirements
            - macOS 14.0 (Sonoma) or later
            - Accessibility permission (for keyboard/mouse control)
            - Screen Recording permission (for screenshots)

            ### What's New
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate source SHA256
        id: src_sha
        run: |
          SRC_SHA=$(curl -sL "https://github.com/${{ github.repository }}/archive/refs/tags/v${{ steps.version.outputs.VERSION }}.tar.gz" | shasum -a 256 | awk '{print $1}')
          echo "SHA256=$SRC_SHA" >> $GITHUB_OUTPUT
          echo "Source SHA256: $SRC_SHA"

      - name: Update Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DMG_SHA="${{ steps.sha.outputs.SHA256 }}"
          SRC_SHA="${{ steps.src_sha.outputs.SHA256 }}"

          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/Geisterhand-io/homebrew-tap.git" tap-repo
          cd tap-repo

          # Update cask
          sed -i '' "s/version \"[^\"]*\"/version \"$VERSION\"/" Casks/geisterhand.rb
          sed -i '' "s/sha256 \"[^\"]*\"/sha256 \"$DMG_SHA\"/" Casks/geisterhand.rb

          # Update source formula
          sed -i '' "s|/v[0-9]*\.[0-9]*\.[0-9]*.tar.gz|/v$VERSION.tar.gz|" Formula/geisterhand.rb
          sed -i '' "s/sha256 \"[^\"]*\"/sha256 \"$SRC_SHA\"/" Formula/geisterhand.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update to v$VERSION"
          git push
